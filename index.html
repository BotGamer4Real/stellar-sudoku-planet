<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Stellar Sudoku Planet</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        background: #0a0a2a;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .auth-form {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1a1a2e;
        border: 3px solid #00ffff;
        border-radius: 12px;
        padding: 40px 60px;
        width: 420px;
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        z-index: 100;
        text-align: center;
      }
      .auth-form input {
        width: 100%;
        padding: 14px;
        margin: 12px 0;
        border: 2px solid #00ffaa;
        border-radius: 8px;
        background: #0f0f1f;
        color: #ffffff;
        font-size: 18px;
        outline: none;
      }
      .auth-form button {
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        background: #00ff00;
        color: #000000;
        border: none;
        border-radius: 8px;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
      }
      .auth-form button:hover {
        background: #00cc00;
      }
      .auth-form .placeholder-btn {
        background: #444466;
        color: #aaaaaa;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
